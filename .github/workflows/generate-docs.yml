name: Generate Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-docx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          cd scripts/md2docx && pip install -e .

      - name: Generate DOCX files
        run: |
          md2docx --config docs/conversion_config.json

      - name: Create build artifacts directory
        run: |
          mkdir -p artifacts
          cp -r build/*.docx artifacts/ 2>/dev/null || echo "No docx files in build root"
          find build -name "*.docx" -exec cp --parents {} artifacts/ \;

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ steps.date.outputs.date }}
          release_name: Documentation Release ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false

      - name: Upload DOCX files to release
        run: |
          # Find all docx files and upload them
          find build -name "*.docx" | while read file; do
            filename=$(basename "$file")
            gh release upload release-${{ steps.date.outputs.date }} "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Documentation Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release: release-${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Files:" >> $GITHUB_STEP_SUMMARY
          find build -name "*.docx" -exec basename {} \; | while read file; do
            echo "- $file" >> $GITHUB_STEP_SUMMARY
          done
